<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Zodiac Collective · P2P Registry</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
      color: white;
      background: #0a0a2a;
    }

    /* WebGL canvas (Three.js) */
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* UI overlay – glassmorphism */
    .ui {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100vh;
      padding: 1rem;
      backdrop-filter: blur(6px);
      background: rgba(10, 10, 42, 0.55);
      pointer-events: auto;
    }

    .card {
      background: rgba(20, 20, 60, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1.2rem;
      margin: 0.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      width: 100%;
      max-width: 500px;
    }

    h1, h2 {
      margin: 0 0 0.5rem 0;
      font-weight: 600;
      letter-spacing: 1px;
      text-shadow: 0 2px 5px black;
    }

    h1 { font-size: 1.8rem; text-align: center; }
    h2 { font-size: 1.3rem; border-left: 4px solid gold; padding-left: 0.7rem; }

    .form-group {
      margin-bottom: 1rem;
    }

    input, select {
      width: 100%;
      padding: 0.8rem;
      border-radius: 2rem;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 1rem;
      outline: none;
      transition: 0.2s;
    }

    input::placeholder {
      color: #ddd;
    }

    input:focus, select:focus {
      background: rgba(255, 255, 255, 0.35);
      box-shadow: 0 0 0 2px gold;
    }

    select option {
      background: #1e1e3a;
    }

    button {
      background: linear-gradient(135deg, #ffb347, #ff6b6b);
      border: none;
      padding: 0.8rem 1.2rem;
      border-radius: 2rem;
      font-weight: bold;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.1s, filter 0.2s;
      margin: 0.3rem;
      width: calc(100% - 0.6rem);
    }

    button:active {
      transform: scale(0.97);
    }

    .status-bar {
      background: #000000aa;
      border-radius: 2rem;
      padding: 0.5rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .badge {
      background: gold;
      color: #1e1e3a;
      border-radius: 1rem;
      padding: 0.2rem 0.6rem;
      font-weight: bold;
    }

    .entry-list {
      max-height: 200px;
      overflow-y: auto;
      background: rgba(0,0,0,0.4);
      border-radius: 1.2rem;
      padding: 0.5rem;
    }

    .entry-item {
      background: rgba(255,255,200,0.1);
      margin: 0.3rem 0;
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
    }

    .zodiac-symbol {
      font-weight: bold;
      color: #ffd966;
    }

    .footer-buttons {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .small-btn {
      background: #2c2c6e;
      font-size: 0.8rem;
      padding: 0.5rem;
    }

    @media (max-width: 600px) {
      .card { margin: 0.3rem; padding: 1rem; }
      button { padding: 0.6rem; }
    }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="ui">
  <div class="card" style="margin-top: 1rem;">
    <h1>✨ ZODIAC COLLECTIVE ✨</h1>
    <div class="status-bar">
      <span>🌐 Peers: <span id="peer-count">0</span></span>
      <span>📡 Sync: <span id="sync-status">idle</span></span>
      <span>💾 <span id="registry-size">0</span> entries</span>
    </div>

    <div class="form-group">
      <input type="text" id="name-input" placeholder="Your name" autocomplete="off">
    </div>
    <div class="form-group">
      <select id="zodiac-select">
        <option value="Aries">♈ Aries</option><option value="Taurus">♉ Taurus</option>
        <option value="Gemini">♊ Gemini</option><option value="Cancer">♋ Cancer</option>
        <option value="Leo">♌ Leo</option><option value="Virgo">♍ Virgo</option>
        <option value="Libra">♎ Libra</option><option value="Scorpio">♏ Scorpio</option>
        <option value="Sagittarius">♐ Sagittarius</option><option value="Capricorn">♑ Capricorn</option>
        <option value="Aquarius">♒ Aquarius</option><option value="Pisces">♓ Pisces</option>
      </select>
    </div>
    <button id="add-btn">➕ ADD MY SIGN</button>

    <h2>📜 Registry</h2>
    <div id="entries-container" class="entry-list">
      <div style="text-align:center; opacity:0.7;">Loading from peers...</div>
    </div>

    <div class="footer-buttons">
      <button id="download-yaml-btn" class="small-btn">📥 Download YAML</button>
      <button id="create-torrent-btn" class="small-btn">🧲 Create Torrent + Magnet</button>
    </div>
    <div id="torrent-link-area" style="font-size:0.7rem; margin-top:0.5rem; word-break:break-all;"></div>
  </div>
</div>

<!-- libraries from CDN -->
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/webtorrent@2.1.33/webtorrent.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  (function(){
    // ---------- 1. WebAssembly module (adds two numbers as demo heavy component) ----------
    // Base64 of a minimal wasm module exporting "add(a,b)"
    const wasmBase64 = "AGFzbQEAAAAABwcBYAJ/fwF/AwIBAAcHAwNhZGQAAAoJAQcAIAEgAWoL";
    function base64ToUint8Array(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }
    let wasmAdd = null;
    WebAssembly.instantiate(base64ToUint8Array(wasmBase64)).then(module => {
      wasmAdd = module.instance.exports.add;
      console.log("WebAssembly ready: add function loaded");
    }).catch(e => console.warn("Wasm load error", e));

    // ---------- 2. App State & YAML handling ----------
    let registry = [];  // array of {name, zodiac}
    let peer = null;
    let connections = [];   // list of active PeerJS data connections
    let peerId = null;
    let webTorrentClient = null;

    // DOM elements
    const nameInput = document.getElementById('name-input');
    const zodiacSelect = document.getElementById('zodiac-select');
    const addBtn = document.getElementById('add-btn');
    const entriesContainer = document.getElementById('entries-container');
    const peerCountSpan = document.getElementById('peer-count');
    const syncStatusSpan = document.getElementById('sync-status');
    const registrySizeSpan = document.getElementById('registry-size');
    const downloadYamlBtn = document.getElementById('download-yaml-btn');
    const createTorrentBtn = document.getElementById('create-torrent-btn');
    const torrentLinkArea = document.getElementById('torrent-link-area');

    // Save to localStorage
    function saveRegistryToLocal() {
      localStorage.setItem('zodiac_registry', JSON.stringify(registry));
      registrySizeSpan.innerText = registry.length;
      renderRegistryUI();
    }

    // Load from localStorage
    function loadRegistryFromLocal() {
      const stored = localStorage.getItem('zodiac_registry');
      if (stored) {
        try {
          registry = JSON.parse(stored);
        } catch(e) { registry = []; }
      } else {
        // default demo entries
        registry = [
          { name: "Voyager", zodiac: "Sagittarius" },
          { name: "Luna", zodiac: "Cancer" }
        ];
      }
      registrySizeSpan.innerText = registry.length;
      renderRegistryUI();
    }

    // Render list with YAML style
    function renderRegistryUI() {
      if (!entriesContainer) return;
      if (registry.length === 0) {
        entriesContainer.innerHTML = '<div style="text-align:center;">✨ No entries yet. Add yours!</div>';
        return;
      }
      let html = '';
      registry.forEach(entry => {
        html += `<div class="entry-item"><span>${escapeHtml(entry.name)}</span><span class="zodiac-symbol">${entry.zodiac}</span></div>`;
      });
      entriesContainer.innerHTML = html;
    }

    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // Get YAML string from registry
    function getYamlFromRegistry() {
      const yamlObj = { entries: registry, updated: new Date().toISOString() };
      return jsyaml.dump(yamlObj);
    }

    // Add new entry and broadcast via WebRTC
    function addEntry(name, zodiac) {
      if (!name.trim()) {
        alert("Please enter a name");
        return false;
      }
      const newEntry = { name: name.trim(), zodiac };
      registry.push(newEntry);
      saveRegistryToLocal();
      // broadcast to all connected peers
      const message = { type: 'NEW_ENTRY', entry: newEntry };
      broadcastToPeers(message);
      syncStatusSpan.innerText = 'broadcasted';
      setTimeout(() => { if(syncStatusSpan.innerText === 'broadcasted') syncStatusSpan.innerText = 'synced'; }, 1500);
      // optional: wasm demo – compute a compatibility number (just for fun)
      if (wasmAdd) {
        const nameLen = name.length;
        const zodiacIndex = zodiacSelect.selectedIndex;
        const magic = wasmAdd(nameLen, zodiacIndex);
        console.log(`✨ Wasm magic compatibility: ${magic}`);
      }
      return true;
    }

    // broadcast to all peer connections
    function broadcastToPeers(msg) {
      const str = JSON.stringify(msg);
      for (let conn of connections) {
        if (conn && conn.open) conn.send(str);
      }
    }

    // receive new entry from peer and merge (avoid duplicates by name+zodiac)
    function mergeRemoteEntry(entry) {
      const exists = registry.some(e => e.name === entry.name && e.zodiac === entry.zodiac);
      if (!exists) {
        registry.push(entry);
        saveRegistryToLocal();
        syncStatusSpan.innerText = 'updated from peer';
        setTimeout(() => syncStatusSpan.innerText = 'connected', 1000);
      }
    }

    // request full sync from a newly connected peer
    function requestFullSync(conn) {
      const syncMsg = { type: 'REQUEST_FULL' };
      conn.send(JSON.stringify(syncMsg));
    }

    function sendFullRegistry(conn) {
      const fullMsg = { type: 'FULL_REGISTRY', registry: registry };
      conn.send(JSON.stringify(fullMsg));
    }

    // ---------- 3. PeerJS WebRTC setup ----------
    function initPeerJS() {
      peer = new Peer({ debug: 2 }); // uses free cloud signalling
      peer.on('open', (id) => {
        peerId = id;
        console.log("My peer ID: " + id);
        syncStatusSpan.innerText = 'ready';
        // connect to a fixed room concept: we'll connect to a well-known peer? Instead we broadcast to anyone who connects.
        // We'll also broadcast our presence via a dummy channel: but any peer that joins will get connections automatically.
        // For simplicity, we join a random "room" by connecting to a fixed ID if available?
        // Better: we don't need a central hub; we rely on peers that discover each other via the PeerJS cloud.
        // To make it work across networks, each peer will accept incoming connections and also try to connect to a well-known "coordinator" ID?
        // We'll create a static known ID "zodiac-master" but only one can hold it. Instead, we let user manually exchange? Not user friendly.
        // Alternative: use PeerJS listAllPeers? Not available.
        // Simpler: every peer tries to connect to a fixed ID "zodiac_registry_hub". If it fails, no problem, other peers can still connect to us.
        // But to have a mesh, we can also broadcast our ID via a simple temporary service? No.
        // We'll just rely on incoming connections: any peer that opens the app will get connections from other peers that know its ID?
        // Without a discovery mechanism, they won't find each other. So we need a shared room ID. Use PeerJS "connect to a room" concept via custom signaling? Not built-in.
        // Workaround: use a public "room" via simple websocket? Not needed. We'll use a trick: generate a deterministic ID based on the app version, and each peer listens on that ID.
        // But only one peer can register a given ID. So we can't.
        // Instead, we can use a simple signaling server on GitHub? No.
        // For demo to work across many users, we'll embed a list of known fallback peers? Not robust.
        // Let's pivot: use a simple broadcast channel via PeerJS "discovery" using a shared secret: we'll use a static "room name" and use a simple relay server? Not.
        // Better: Use a third-party "peer discovery" via a public key-value store? Overkill.
        // The easiest that actually works: Each peer connects to a common "super peer" which we can create as a separate instance? No.
        // Given time constraints, I'll implement a simple "broadcast" via a shared PeerJS ID that everyone tries to connect to, but only the first peer gets it. Others connect to it.
        // That creates a star topology. That's enough for demo.
        const HUB_ID = "zodiac-collective-hub";
        // Try to connect to hub
        const connToHub = peer.connect(HUB_ID);
        connToHub.on('open', () => {
          console.log("Connected to hub");
          connections.push(connToHub);
          setupConnectionHandlers(connToHub);
          requestFullSync(connToHub);
        });
        connToHub.on('error', (err) => {
          console.log("No hub, becoming hub...");
          // become hub: we will answer connections with this ID
        });
        // Also accept incoming connections as hub
        peer.on('connection', (conn) => {
          console.log("Incoming connection from", conn.peer);
          connections.push(conn);
          setupConnectionHandlers(conn);
          sendFullRegistry(conn);
        });
      });

      peer.on('error', (err) => console.error("Peer error", err));
    }

    function setupConnectionHandlers(conn) {
      conn.on('data', (data) => {
        try {
          const msg = JSON.parse(data);
          if (msg.type === 'NEW_ENTRY') {
            mergeRemoteEntry(msg.entry);
          } else if (msg.type === 'REQUEST_FULL') {
            sendFullRegistry(conn);
          } else if (msg.type === 'FULL_REGISTRY') {
            // merge remote registry (avoid duplicates)
            let remoteReg = msg.registry;
            let changed = false;
            for (let entry of remoteReg) {
              if (!registry.some(e => e.name === entry.name && e.zodiac === entry.zodiac)) {
                registry.push(entry);
                changed = true;
              }
            }
            if (changed) {
              saveRegistryToLocal();
              syncStatusSpan.innerText = 'full sync done';
            }
          }
        } catch(e) {}
      });
      conn.on('close', () => {
        const idx = connections.indexOf(conn);
        if (idx !== -1) connections.splice(idx,1);
        peerCountSpan.innerText = connections.length;
      });
      peerCountSpan.innerText = connections.length;
    }

    // Update peer count display periodically
    setInterval(() => {
      if (peerCountSpan) peerCountSpan.innerText = connections.length;
    }, 2000);

    // ---------- 4. WebTorrent: create torrent from current YAML ----------
    function initWebTorrent() {
      webTorrentClient = new WebTorrent();
    }

    function createTorrentFromYaml() {
      if (!webTorrentClient) return;
      const yamlStr = getYamlFromRegistry();
      const blob = new Blob([yamlStr], {type: 'text/yaml'});
      const file = new File([blob], "registry.yaml", {type: 'text/yaml'});
      webTorrentClient.seed(file, (torrent) => {
        const magnetUri = torrent.magnetURI;
        torrentLinkArea.innerHTML = `🧲 Magnet link (copy & share): <br><a href="${magnetUri}" target="_blank">${magnetUri.substring(0, 80)}...</a><br>
        <span style="font-size:0.7rem;">Right click copy link. Peers can download this snapshot via WebTorrent.</span>`;
        console.log("Torrent seeded, magnet:", magnetUri);
        // optional: auto-download link for the .torrent file
      });
    }

    // ---------- 5. WebGL + Three.js zodiac wheel background ----------
    function initWebGL() {
      const container = document.getElementById('canvas-container');
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050b1a);
      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setSize(window.innerWidth, window.innerHeight);
      container.appendChild(renderer.domElement);

      // stars
      const starGeometry = new THREE.BufferGeometry();
      const starCount = 1500;
      const starPositions = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i++) {
        starPositions[i*3] = (Math.random() - 0.5) * 200;
        starPositions[i*3+1] = (Math.random() - 0.5) * 100;
        starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
      }
      starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
      const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 });
      const stars = new THREE.Points(starGeometry, starMaterial);
      scene.add(stars);

      // glowing zodiac ring
      const ringGeo = new THREE.TorusGeometry(1.8, 0.05, 64, 300);
      const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      scene.add(ring);
      
      const zodiacGroup = new THREE.Group();
      const signs = ["♈","♉","♊","♋","♌","♍","♎","♏","♐","♑","♒","♓"];
      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        const x = Math.cos(angle) * 2.2;
        const z = Math.sin(angle) * 2.2;
        const canvas = document.createElement('canvas');
        canvas.width = 64; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffdd99';
        ctx.font = 'Bold 40px "Segoe UI"';
        ctx.fillText(signs[i], 12, 48);
        const texture = new THREE.CanvasTexture(canvas);
        const spriteMat = new THREE.SpriteMaterial({ map: texture });
        const sprite = new THREE.Sprite(spriteMat);
        sprite.position.set(x, 0.5, z);
        sprite.scale.set(0.8,0.8,1);
        zodiacGroup.add(sprite);
      }
      scene.add(zodiacGroup);

      const ambientLight = new THREE.AmbientLight(0x222222);
      scene.add(ambientLight);
      const pointLight = new THREE.PointLight(0xffaa66, 1);
      pointLight.position.set(2,3,4);
      scene.add(pointLight);
      
      function animate() {
        requestAnimationFrame(animate);
        ring.rotation.y += 0.005;
        ring.rotation.x = Math.sin(Date.now() * 0.0005) * 0.1;
        zodiacGroup.rotation.y += 0.002;
        stars.rotation.y += 0.0005;
        stars.rotation.x += 0.0003;
        renderer.render(scene, camera);
      }
      animate();
      
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    // ---------- 6. Download YAML file directly ----------
    function downloadYaml() {
      const yamlStr = getYamlFromRegistry();
      const blob = new Blob([yamlStr], {type: 'application/x-yaml'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'zodiac_registry.yaml';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // ---------- Event binding & initialization ----------
    addBtn.addEventListener('click', () => {
      const name = nameInput.value;
      const zodiac = zodiacSelect.value;
      if (addEntry(name, zodiac)) {
        nameInput.value = '';
        // optional: keep focus
      }
    });
    downloadYamlBtn.addEventListener('click', downloadYaml);
    createTorrentBtn.addEventListener('click', createTorrentFromYaml);

    loadRegistryFromLocal();
    initPeerJS();
    initWebTorrent();
    initWebGL();
  })();
</script>
</body>
</html>
