<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Zodiac Collective · P2P Registry</title>
  <style>
    * { box-sizing: border-box; user-select: none; }
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif; color: white; background: #0a0a2a; }
    #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    .ui { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: space-between; min-height: 100vh; padding: 1rem; backdrop-filter: blur(6px); background: rgba(10,10,42,0.55); pointer-events: auto; }
    .card { background: rgba(20,20,60,0.75); backdrop-filter: blur(12px); border-radius: 2rem; padding: 1.2rem; margin: 0.5rem; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); width: 100%; max-width: 500px; }
    h1, h2 { margin: 0 0 0.5rem 0; font-weight: 600; letter-spacing: 1px; text-shadow: 0 2px 5px black; }
    h1 { font-size: 1.8rem; text-align: center; }
    h2 { font-size: 1.3rem; border-left: 4px solid gold; padding-left: 0.7rem; }
    .form-group { margin-bottom: 1rem; }
    input, select { width: 100%; padding: 0.8rem; border-radius: 2rem; border: none; background: rgba(255,255,255,0.2); color: white; font-size: 1rem; outline: none; transition: 0.2s; }
    input::placeholder { color: #ddd; }
    input:focus, select:focus { background: rgba(255,255,255,0.35); box-shadow: 0 0 0 2px gold; }
    select option { background: #1e1e3a; }
    button { background: linear-gradient(135deg, #ffb347, #ff6b6b); border: none; padding: 0.8rem 1.2rem; border-radius: 2rem; font-weight: bold; color: white; font-size: 1rem; cursor: pointer; transition: transform 0.1s, filter 0.2s; margin: 0.3rem; width: calc(100% - 0.6rem); }
    button:active { transform: scale(0.97); }
    .status-bar { background: #000000aa; border-radius: 2rem; padding: 0.5rem 1rem; margin-bottom: 1rem; font-size: 0.85rem; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    .badge { background: gold; color: #1e1e3a; border-radius: 1rem; padding: 0.2rem 0.6rem; font-weight: bold; }
    .entry-list { max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.4); border-radius: 1.2rem; padding: 0.5rem; }
    .entry-item { background: rgba(255,255,200,0.1); margin: 0.3rem 0; padding: 0.4rem 0.8rem; border-radius: 2rem; font-size: 0.9rem; display: flex; justify-content: space-between; }
    .zodiac-symbol { font-weight: bold; color: #ffd966; }
    .footer-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .small-btn { background: #2c2c6e; font-size: 0.8rem; padding: 0.5rem; }
    @media (max-width: 600px) { .card { margin: 0.3rem; padding: 1rem; } button { padding: 0.6rem; } }
  </style>
</head>
<body>
<div id="canvas-container"></div>
<div class="ui">
  <div class="card" style="margin-top: 1rem;">
    <h1>✨ ZODIAC COLLECTIVE ✨</h1>
    <div class="status-bar">
      <span>🌐 Peers: <span id="peer-count">0</span></span>
      <span>📡 Sync: <span id="sync-status">connecting...</span></span>
      <span>💾 <span id="registry-size">0</span> entries</span>
    </div>
    <div class="form-group">
      <input type="text" id="name-input" placeholder="Your name" autocomplete="off">
    </div>
    <div class="form-group">
      <select id="zodiac-select">
        <option value="Aries">♈ Aries</option><option value="Taurus">♉ Taurus</option>
        <option value="Gemini">♊ Gemini</option><option value="Cancer">♋ Cancer</option>
        <option value="Leo">♌ Leo</option><option value="Virgo">♍ Virgo</option>
        <option value="Libra">♎ Libra</option><option value="Scorpio">♏ Scorpio</option>
        <option value="Sagittarius">♐ Sagittarius</option><option value="Capricorn">♑ Capricorn</option>
        <option value="Aquarius">♒ Aquarius</option><option value="Pisces">♓ Pisces</option>
      </select>
    </div>
    <button id="add-btn">➕ ADD MY SIGN</button>
    <h2>📜 Registry</h2>
    <div id="entries-container" class="entry-list"><div style="text-align:center; opacity:0.7;">Loading...</div></div>
    <div class="footer-buttons">
      <button id="download-yaml-btn" class="small-btn">📥 Download YAML</button>
      <button id="create-torrent-btn" class="small-btn">🧲 Create Torrent + Magnet</button>
    </div>
    <div id="torrent-link-area" style="font-size:0.7rem; margin-top:0.5rem; word-break:break-all;"></div>
  </div>
</div>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/webtorrent@2.1.33/webtorrent.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- MQTT over WebSockets (public broker) -->
<script src="https://unpkg.com/mqtt@5.0.0/dist/mqtt.min.js"></script>

<script>
  (function() {
    // ---------- 1. WebAssembly (minimal demo) ----------
    const wasmBase64 = "AGFzbQEAAAAABwcBYAJ/fwF/AwIBAAcHAwNhZGQAAAoJAQcAIAEgAWoL";
    function base64ToUint8Array(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }
    let wasmAdd = null;
    WebAssembly.instantiate(base64ToUint8Array(wasmBase64)).then(module => {
      wasmAdd = module.instance.exports.add;
      console.log("WebAssembly ready");
    }).catch(e => console.warn("Wasm load error", e));

    // ---------- 2. App state & storage ----------
    let registry = [];            // {name, zodiac}
    let peer = null;
    let connections = new Map();  // peerId -> connection
    let myPeerId = null;
    let webTorrentClient = null;
    let mqttClient = null;
    const MQTT_TOPIC = "zodiac-collective";

    // DOM elements
    const nameInput = document.getElementById('name-input');
    const zodiacSelect = document.getElementById('zodiac-select');
    const addBtn = document.getElementById('add-btn');
    const entriesContainer = document.getElementById('entries-container');
    const peerCountSpan = document.getElementById('peer-count');
    const syncStatusSpan = document.getElementById('sync-status');
    const registrySizeSpan = document.getElementById('registry-size');
    const downloadYamlBtn = document.getElementById('download-yaml-btn');
    const createTorrentBtn = document.getElementById('create-torrent-btn');
    const torrentLinkArea = document.getElementById('torrent-link-area');

    function saveRegistryToLocal() {
      localStorage.setItem('zodiac_registry', JSON.stringify(registry));
      registrySizeSpan.innerText = registry.length;
      renderRegistryUI();
    }

    function loadRegistryFromLocal() {
      const stored = localStorage.getItem('zodiac_registry');
      if (stored) {
        try { registry = JSON.parse(stored); } catch(e) { registry = []; }
      } else {
        registry = [
          { name: "Voyager", zodiac: "Sagittarius" },
          { name: "Luna", zodiac: "Cancer" }
        ];
      }
      registrySizeSpan.innerText = registry.length;
      renderRegistryUI();
    }

    function renderRegistryUI() {
      if (!entriesContainer) return;
      if (registry.length === 0) {
        entriesContainer.innerHTML = '<div style="text-align:center;">✨ No entries yet. Add yours!</div>';
        return;
      }
      let html = '';
      registry.forEach(entry => {
        html += `<div class="entry-item"><span>${escapeHtml(entry.name)}</span><span class="zodiac-symbol">${entry.zodiac}</span></div>`;
      });
      entriesContainer.innerHTML = html;
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }

    function getYamlFromRegistry() {
      const yamlObj = { entries: registry, updated: new Date().toISOString() };
      return jsyaml.dump(yamlObj);
    }

    // Broadcast to all connected WebRTC peers
    function broadcastToPeers(msg) {
      const str = JSON.stringify(msg);
      for (let [id, conn] of connections.entries()) {
        if (conn && conn.open) conn.send(str);
      }
    }

    function mergeRemoteEntry(entry) {
      const exists = registry.some(e => e.name === entry.name && e.zodiac === entry.zodiac);
      if (!exists) {
        registry.push(entry);
        saveRegistryToLocal();
        syncStatusSpan.innerText = 'updated from peer';
        setTimeout(() => { if(syncStatusSpan.innerText === 'updated from peer') syncStatusSpan.innerText = 'connected'; }, 1500);
      }
    }

    function sendFullRegistry(conn) {
      const fullMsg = { type: 'FULL_REGISTRY', registry: registry };
      conn.send(JSON.stringify(fullMsg));
    }

    // ---------- 3. WebRTC + MQTT discovery (no Google, no Firebase) ----------
    function initPeerAndMQTT() {
      // Create PeerJS instance (random ID assigned by cloud)
      peer = new Peer();
      
      peer.on('open', (id) => {
        myPeerId = id;
        console.log("My Peer ID:", id);
        syncStatusSpan.innerText = 'MQTT connecting...';
        
        // Connect to public MQTT broker (EMQX)
        mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        
        mqttClient.on('connect', () => {
          console.log("MQTT connected, subscribing to", MQTT_TOPIC);
          syncStatusSpan.innerText = 'discovering peers...';
          mqttClient.subscribe(MQTT_TOPIC, (err) => {
            if (!err) {
              // Announce our presence
              mqttClient.publish(MQTT_TOPIC, myPeerId);
              // Also send a keepalive every 30 seconds
              setInterval(() => {
                if (mqttClient && mqttClient.connected) {
                  mqttClient.publish(MQTT_TOPIC, myPeerId);
                }
              }, 30000);
            }
          });
        });
        
        mqttClient.on('message', (topic, message) => {
          const remoteId = message.toString();
          if (remoteId === myPeerId) return;
          if (connections.has(remoteId)) return;
          console.log("Discovered peer via MQTT:", remoteId);
          // Connect to this peer
          const conn = peer.connect(remoteId);
          setupConnection(conn, remoteId);
        });
        
        mqttClient.on('error', (err) => {
          console.error("MQTT error", err);
          syncStatusSpan.innerText = 'MQTT error';
        });
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
          if (mqttClient && mqttClient.connected) {
            mqttClient.end();
          }
        });
      });
      
      peer.on('connection', (conn) => {
        const remoteId = conn.peer;
        if (connections.has(remoteId)) return;
        setupConnection(conn, remoteId);
      });
      
      peer.on('error', (err) => console.error("Peer error", err));
    }
    
    function setupConnection(conn, remoteId) {
      connections.set(remoteId, conn);
      updatePeerCount();
      conn.on('open', () => {
        console.log("WebRTC connected to", remoteId);
        sendFullRegistry(conn);  // sync new peer
      });
      conn.on('data', (data) => {
        try {
          const msg = JSON.parse(data);
          if (msg.type === 'NEW_ENTRY') {
            mergeRemoteEntry(msg.entry);
          } else if (msg.type === 'REQUEST_FULL') {
            sendFullRegistry(conn);
          } else if (msg.type === 'FULL_REGISTRY') {
            let remoteReg = msg.registry;
            let changed = false;
            for (let entry of remoteReg) {
              if (!registry.some(e => e.name === entry.name && e.zodiac === entry.zodiac)) {
                registry.push(entry);
                changed = true;
              }
            }
            if (changed) {
              saveRegistryToLocal();
              syncStatusSpan.innerText = 'full sync done';
              setTimeout(() => syncStatusSpan.innerText = 'connected', 1500);
            }
          }
        } catch(e) {}
      });
      conn.on('close', () => {
        connections.delete(remoteId);
        updatePeerCount();
      });
    }
    
    function updatePeerCount() {
      peerCountSpan.innerText = connections.size;
    }
    
    // Add entry locally and broadcast via WebRTC
    function addEntry(name, zodiac) {
      if (!name.trim()) { alert("Please enter a name"); return false; }
      const newEntry = { name: name.trim(), zodiac };
      registry.push(newEntry);
      saveRegistryToLocal();
      broadcastToPeers({ type: 'NEW_ENTRY', entry: newEntry });
      syncStatusSpan.innerText = 'broadcasted';
      setTimeout(() => { if(syncStatusSpan.innerText === 'broadcasted') syncStatusSpan.innerText = 'connected'; }, 1500);
      if (wasmAdd) {
        const magic = wasmAdd(name.length, zodiacSelect.selectedIndex);
        console.log("Wasm magic:", magic);
      }
      return true;
    }
    
    // ---------- 4. WebTorrent (create snapshot) ----------
    function initWebTorrent() { webTorrentClient = new WebTorrent(); }
    function createTorrentFromYaml() {
      if (!webTorrentClient) return;
      const yamlStr = getYamlFromRegistry();
      const blob = new Blob([yamlStr], {type: 'text/yaml'});
      const file = new File([blob], "registry.yaml", {type: 'text/yaml'});
      webTorrentClient.seed(file, (torrent) => {
        const magnetUri = torrent.magnetURI;
        torrentLinkArea.innerHTML = `🧲 Magnet link (share): <br><a href="${magnetUri}" target="_blank">${magnetUri.substring(0, 80)}...</a><br><span style="font-size:0.7rem;">Right click copy link</span>`;
      });
    }
    
    // ---------- 5. WebGL background (Three.js zodiac wheel) ----------
    function initWebGL() {
      const container = document.getElementById('canvas-container');
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050b1a);
      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      container.appendChild(renderer.domElement);
      // stars
      const starGeometry = new THREE.BufferGeometry();
      const starCount = 1500;
      const starPositions = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i++) {
        starPositions[i*3] = (Math.random() - 0.5) * 200;
        starPositions[i*3+1] = (Math.random() - 0.5) * 100;
        starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
      }
      starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
      const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 });
      const stars = new THREE.Points(starGeometry, starMaterial);
      scene.add(stars);
      // zodiac ring
      const ringGeo = new THREE.TorusGeometry(1.8, 0.05, 64, 300);
      const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      scene.add(ring);
      const zodiacGroup = new THREE.Group();
      const signs = ["♈","♉","♊","♋","♌","♍","♎","♏","♐","♑","♒","♓"];
      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        const x = Math.cos(angle) * 2.2;
        const z = Math.sin(angle) * 2.2;
        const canvas = document.createElement('canvas');
        canvas.width = 64; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffdd99';
        ctx.font = 'Bold 40px "Segoe UI"';
        ctx.fillText(signs[i], 12, 48);
        const texture = new THREE.CanvasTexture(canvas);
        const spriteMat = new THREE.SpriteMaterial({ map: texture });
        const sprite = new THREE.Sprite(spriteMat);
        sprite.position.set(x, 0.5, z);
        sprite.scale.set(0.8,0.8,1);
        zodiacGroup.add(sprite);
      }
      scene.add(zodiacGroup);
      const ambientLight = new THREE.AmbientLight(0x222222);
      scene.add(ambientLight);
      const pointLight = new THREE.PointLight(0xffaa66, 1);
      pointLight.position.set(2,3,4);
      scene.add(pointLight);
      function animate() {
        requestAnimationFrame(animate);
        ring.rotation.y += 0.005;
        ring.rotation.x = Math.sin(Date.now() * 0.0005) * 0.1;
        zodiacGroup.rotation.y += 0.002;
        stars.rotation.y += 0.0005;
        stars.rotation.x += 0.0003;
        renderer.render(scene, camera);
      }
      animate();
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }
    
    // ---------- 6. Download YAML file ----------
    function downloadYaml() {
      const yamlStr = getYamlFromRegistry();
      const blob = new Blob([yamlStr], {type: 'application/x-yaml'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'zodiac_registry.yaml';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
    
    // ---------- Event binding & start ----------
    addBtn.addEventListener('click', () => {
      const name = nameInput.value;
      const zodiac = zodiacSelect.value;
      if (addEntry(name, zodiac)) nameInput.value = '';
    });
    downloadYamlBtn.addEventListener('click', downloadYaml);
    createTorrentBtn.addEventListener('click', createTorrentFromYaml);
    
    loadRegistryFromLocal();
    initWebTorrent();
    initWebGL();
    initPeerAndMQTT();
  })();
</script>
</body>
</html>
